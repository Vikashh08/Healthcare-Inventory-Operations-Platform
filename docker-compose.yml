services:
  postgres:
    image: postgres:15
    container_name: medaxis-postgres
    environment:
      POSTGRES_USER: medaxis
      POSTGRES_PASSWORD: medaxis_password
      POSTGRES_DB: medaxis_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U medaxis"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    container_name: medaxis-redis
    ports:
      - "6379:6379"

volumes:
  postgres_data:
